apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-provisioning
data:
  datasource.yaml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        uid: prometheus
        url: http://prometheus:9090
        isDefault: true
        editable: false
  dashboard-provider.yaml: |
    apiVersion: 1
    providers:
      - name: default
        type: file
        options:
          path: /etc/grafana/dashboards
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboards
data:
  loadbalancer.json: |
    {
      "uid": "load-balancer",
      "title": "Load Balancer",
      "schemaVersion": 38,
      "graphTooltip": 1,
      "version": 1,
      "refresh": "5s",
      "time": { "from": "now-5m", "to": "now" },
      "panels": [
        {
          "id": 1,
          "title": "Request Rate (1m avg)",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 0 },
          "options": {
          "tooltip": {
            "mode": "multi",
            "sort": "desc"
            }
          },
          "fieldConfig": {
            "defaults": { "unit": "reqps" },
            "overrides": [
              {
                "matcher": { "id": "byName", "options": "total" },
                "properties": [
                  { "id": "color", "value": { "mode": "fixed", "fixedColor": "blue" } }
                ]
              },
              {
                "matcher": { "id": "byName", "options": "success" },
                "properties": [
                  { "id": "color", "value": { "mode": "fixed", "fixedColor": "green" } }
                ]
              },
              {
                "matcher": { "id": "byName", "options": "failed" },
                "properties": [
                  { "id": "color", "value": { "mode": "fixed", "fixedColor": "red" } }
                ]
              }
            ]
          },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "rate(lb_requests_total[1m])",
              "legendFormat": "total"
            },
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "rate(lb_requests_success_total[1m])",
              "legendFormat": "success"
            },
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "rate(lb_requests_failed_total[1m])",
              "legendFormat": "failed"
            }
          ]
        },
        {
          "id": 2,
          "title": "Active Connections per Backend",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 0 },
          "options": {
          "tooltip": {
            "mode": "multi",
            "sort": "desc"
            }
          },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "last_over_time(lb_active_connections[30s])",
              "legendFormat": "{{server}}"
            }
          ]
        },
        {
          "id": 3,
          "title": "Server Health",
          "type": "stat",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 16 },
          "options": {
            "reduceOptions": { "calcs": ["last"] },
            "colorMode": "background",
            "textMode": "auto",
            "graphMode": "none"
          },
          "fieldConfig": {
            "defaults": {
              "mappings": [
                {
                  "type": "value",
                  "options": {
                    "0": { "text": "Unhealthy", "color": "red", "index": 0 },
                    "1": { "text": "Healthy",   "color": "green", "index": 1 }
                  }
                }
              ],
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "value": null, "color": "red" },
                  { "value": 1,    "color": "green" }
                ]
              }
            }
          },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "lb_server_health",
              "legendFormat": "{{server}}",
              "instant": true
            }
          ]
        },
        {
          "id": 4,
          "title": "Cumulative Totals",
          "type": "stat",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 16 },
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"] },
            "colorMode": "background"
          },
          "fieldConfig": {
            "defaults": {},
            "overrides": [
              {
                "matcher": { "id": "byName", "options": "Total Requests" },
                "properties": [
                  { "id": "color", "value": { "mode": "fixed", "fixedColor": "blue" } }
                ]
              },
              {
                "matcher": { "id": "byName", "options": "Successes" },
                "properties": [
                  { "id": "color", "value": { "mode": "fixed", "fixedColor": "green" } }
                ]
              },
              {
                "matcher": { "id": "byName", "options": "Failures" },
                "properties": [
                  { "id": "color", "value": { "mode": "fixed", "fixedColor": "red" } }
                ]
              }
            ]
          },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "lb_requests_total",
              "legendFormat": "Total Requests"
            },
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "lb_requests_success_total",
              "legendFormat": "Successes"
            },
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "lb_requests_failed_total",
              "legendFormat": "Failures"
            }
          ]
        },
        {
          "id": 5,
          "title": "Request Latency per Backend (p50 / p95 / p99)",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 24, "x": 0, "y": 8 },
          "options": {
            "tooltip": {
              "mode": "multi",
              "sort": "desc"
            }
          },
          "fieldConfig": {
            "defaults": {
              "unit": "s",
              "custom": { "spanNulls": true }
            }
          },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "histogram_quantile(0.99, sum(rate(lb_request_duration_seconds_bucket[30s])) by (le, server))",
              "legendFormat": "p99 {{server}}"
            },
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "histogram_quantile(0.95, sum(rate(lb_request_duration_seconds_bucket[30s])) by (le, server))",
              "legendFormat": "p95 {{server}}"
            },
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "histogram_quantile(0.50, sum(rate(lb_request_duration_seconds_bucket[30s])) by (le, server))",
              "legendFormat": "p50 {{server}}"
            }
          ]
        }
      ]
    }

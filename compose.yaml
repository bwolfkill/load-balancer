# Development-only configuration. Runs the load balancer alongside three                                                                                                                                                                                                                          
# minimal test backends to demonstrate local operation. For real deployments,                                                                                                                                                                                                                     
# set TARGET_SERVERS to point at your own backends and omit the testservers. 

services:
  loadbalancer:
    image: loadbalancer
    build:
      context: .
      args:
        CMD_PATH: cmd/loadbalancer
    ports:
      - "8080:8080"
    environment:
      TARGET_SERVERS: http://server1:8081,http://server2:8082,http://server3:8083
    depends_on:
      server1:
        condition: service_healthy
      server2:
        condition: service_healthy
      server3:
        condition: service_healthy

  server1:
    image: server1
    build:
      context: .
      args:
        CMD_PATH: testservers/server1
    ports:
      - "8081:8081"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8081/healthz"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s

  server2:
    image: server2
    build:
      context: .
      args:
        CMD_PATH: testservers/server2
    ports:
      - "8082:8082"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8082/healthz"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s

  server3:
    image: server3
    build:
      context: .
      args:
        CMD_PATH: testservers/server3
    ports:
      - "8083:8083"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8083/healthz"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s
  
  prometheus:
    image: prom/prometheus
    ports:
      - "9090:9090"
    command:
      - "--config.file=/etc/prometheus/prometheus.yaml"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./observability/prometheus.yaml:/etc/prometheus/prometheus.yaml

  grafana:
    image: grafana/grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_LOG_LEVEL: warn
    volumes:
      - ./observability/grafana/provisioning:/etc/grafana/provisioning
      - ./observability/grafana/dashboards:/etc/grafana/dashboards
